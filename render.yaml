services:
  - type: web
    name: instagram-clone-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://instagram-clone-web.onrender.com
      - key: SERVE_CLIENT
        value: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: instagram-clone-web
    runtime: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://instagram-clone-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://instagram-clone-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
